services:
  edcrm-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: edcrm-web:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /opt/edcrm/media:/opt/edcrm/media
