services:
  edcrm-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE}
        NEXT_PUBLIC_MEDIA_DRIVER: ${NEXT_PUBLIC_MEDIA_DRIVER}
        MEDIA_DRIVER: ${MEDIA_DRIVER}
        MEDIA_LOCAL_DIR: ${MEDIA_LOCAL_DIR}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL}
        NEXT_PUBLIC_MEDIA_BUCKET: ${NEXT_PUBLIC_MEDIA_BUCKET}
    image: edcrm-web:prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /opt/edcrm/media:/opt/edcrm/media
